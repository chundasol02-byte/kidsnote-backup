# Kidsnote → Notion mirror
#
# AI 기능 비활성화 버전
#
# 동작:
# - Kidsnote 알림장 원문 및 사진을 Notion에 백업
# - 알림장 AI 요약·자녀 일기·부모 편지 생성 안 함
# - 성장 스토리·마일스톤·관심사·선생님 감사 페이지 생성 안 함
# - Ollama 설치 및 실행 안 함
#
# Required GitHub repository secrets:
#   KIDSNOTE_ID
#   KIDSNOTE_PASSWORD
#   NOTION_TOKEN
#   NOTION_DATABASE_ID

name: Kidsnote → Notion mirror

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "최근 N개 알림장만 백업 (전체 백업이면 비워두세요)"
        required: false
        default: ""

      monthly_sample:
        description: "테스트 모드 — 매월 알림장 1개씩만 처리"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      child_name:
        description: "자녀 2명 이상인 경우 백업할 아이 이름 일부 입력"
        required: false
        default: ""

  schedule:
    # 매주 일요일 오전 3시 15분, 한국시간
    - cron: "15 3 * * 0"
      timezone: "Asia/Seoul"

permissions:
  contents: read

concurrency:
  group: kidsnote-to-notion
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          pip install -r tools/kidsnote_fetch/requirements.txt
          pip install pillow piexif playwright

      - name: Install Playwright Chromium
        run: |
          set -euo pipefail

          python -m playwright install --with-deps chromium

      - name: Verify required secrets
        env:
          KIDSNOTE_ID: ${{ secrets.KIDSNOTE_ID }}
          KIDSNOTE_PASSWORD: ${{ secrets.KIDSNOTE_PASSWORD }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          set -euo pipefail

          MISSING_SECRET=false

          for secret_name in \
            KIDSNOTE_ID \
            KIDSNOTE_PASSWORD \
            NOTION_TOKEN \
            NOTION_DATABASE_ID
          do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Repository secret '${secret_name}' is empty or unset"
              MISSING_SECRET=true
            fi
          done

          if [ "${MISSING_SECRET}" = "true" ]; then
            exit 1
          fi

      - name: Login to Kidsnote via Playwright
        env:
          KIDSNOTE_ID: ${{ secrets.KIDSNOTE_ID }}
          KIDSNOTE_PASSWORD: ${{ secrets.KIDSNOTE_PASSWORD }}
        run: |
          set -euo pipefail

          python tools/kidsnote_fetch/login_playwright.py

      - name: Mirror Kidsnote → Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

          PYTHONUNBUFFERED: "1"

          # 수동 실행에서만 입력값 적용
          KIDSNOTE_CHILD_NAME: >-
            ${{ github.event_name == 'workflow_dispatch'
                && inputs.child_name
                || '' }}

          RUN_LIMIT: >-
            ${{ github.event_name == 'workflow_dispatch'
                && inputs.limit
                || '' }}

          MONTHLY_SAMPLE: >-
            ${{ github.event_name == 'workflow_dispatch'
                && inputs.monthly_sample == 'true'
                && 'true'
                || 'false' }}

          # ─────────────────────────────────────
          # AI 기능 전체 강제 비활성화
          # ─────────────────────────────────────

          # 알림장 내부 AI 요약·자녀 일기·부모 편지 비활성화
          DISABLE_ALL_LLM: "true"

          # AI 별도 페이지 비활성화
          DISABLE_GROWTH_STORY: "true"
          DISABLE_MILESTONES: "true"
          DISABLE_INTERESTS: "true"
          DISABLE_TEACHER_THANKS: "true"

        run: |
          set -euo pipefail

          ARGS=(
            "--auth-mode"
            "session-cookie-env"
            "--publish-to-notion"
            "--no-local-save"
            "--child-id"
            "5305112"
          )

          if [ -n "${RUN_LIMIT}" ]; then
            ARGS+=(
              "--limit"
              "${RUN_LIMIT}"
            )
          fi

          if [ "${MONTHLY_SAMPLE}" = "true" ]; then
            ARGS+=(
              "--monthly-sample"
            )
          fi

          echo "============================================"
          echo "Kidsnote → Notion backup"
          echo "AI functions: disabled"
          echo "Growth story: disabled"
          echo "Milestones: disabled"
          echo "Interests: disabled"
          echo "Teacher thanks: disabled"
          echo "============================================"

          python tools/kidsnote_fetch/fetch.py "${ARGS[@]}"

      - name: Upload diagnostic logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kidsnote-backup-failure-logs
          path: |
            /tmp/ollama.log
            tools/kidsnote_fetch/*.log
            tools/kidsnote_fetch/**/*.log
          if-no-files-found: ignore
          retention-days: 7
