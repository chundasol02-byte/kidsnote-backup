# Kidsnote → Notion mirror
#
# AUTOMATED LOGIN VIA PLAYWRIGHT. No longer requires manual cookie extraction.
# Stores login credentials in KIDSNOTE_ID and KIDSNOTE_PASSWORD secrets.
#
# Dedup: each new Notion page records the kidsnote `Report ID`. Subsequent
# runs query the DB once at startup and skip reports whose id is already
# stored, so re-running is safe and idempotent.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   KIDSNOTE_ID           Kidsnote login email/ID
#   KIDSNOTE_PASSWORD     Kidsnote login password
#   NOTION_TOKEN          internal integration token from notion.so/profile/integrations
#   NOTION_DATABASE_ID    32-char hex id from your Notion DB URL

name: Kidsnote → Notion mirror
 
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "최근 N개 알림장만 백업 (전체 백업이면 비워두세요. 예: 3 입력 시 최근 3개만)"
        required: false
        default: ""
      monthly_sample:
        description: "테스트 모드 — 매월 알림장 1개씩만 처리 (셋업 검증·빠른 확인용. 평소엔 false)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      force_refresh:
        description: "기존 노션 페이지 모두 archive 후 처음부터 재발행 (코드 업데이트·prompt 개선 후 사용. 평소엔 false)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      child_name:
        description: "자녀 1명이면 비워두세요. 자녀 2명 이상이면 백업할 아이 이름 일부 입력 (예: '하린')"
        required: false
        default: ""
      use_ai_features:
        description: "AI 가공 — 알림장 안(💭요약·🧒자녀일기·👨‍👩‍👧부모편지) + 별도 페이지 4개(📖성장스토리·🌟마일스톤·🌱관심사·💌선생님께). false면 단순 백업 + 통계 3개(📊통계·📅작년추억·🥗영양)만"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      use_growth_story:
        description: "📖 매월 성장 스토리 별도 페이지 생성"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      use_milestones:
        description: "🌟 우리 아이의 처음들(마일스톤) 별도 페이지 생성"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      use_interests:
        description: "🌱 분기별 관심사 별도 페이지 생성"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      use_teacher_thanks:
        description: "💌 연도별 선생님께 감사 카드 별도 페이지 생성"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

schedule:
    - cron: "15 3 * * 0"
      timezone: "Asia/Seoul"

permissions:
  contents: read

concurrency:
  group: kidsnote-to-notion
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install fetcher deps + image helpers + playwright
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/kidsnote_fetch/requirements.txt
          pip install pillow piexif playwright
          
      - name: Install Playwright Chromium Browser
        run: |
          python -m playwright install chromium

      - name: Login to Kidsnote via Playwright
        env:
          KIDSNOTE_ID: ${{ secrets.KIDSNOTE_ID }}
          KIDSNOTE_PASSWORD: ${{ secrets.KIDSNOTE_PASSWORD }}
        run: |
          python tools/kidsnote_fetch/login_playwright.py

      # ---- Ollama for body summary + LLM dashboards ----
      - name: Cache Ollama models
        id: ollama-cache
        if: ${{ inputs.use_ai_features != 'false' }}
        uses: actions/cache@v5
        with:
          path: ~/.ollama
          key: ollama-llama3.1-8b-v2

      - name: Install Ollama + pull model
        if: ${{ inputs.use_ai_features != 'false' }}
        run: |
          if ! command -v ollama >/dev/null 2>&1; then
            curl -fsSL https://ollama.com/install.sh | sh
          fi
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/version >/dev/null 2>&1; then
              echo "ollama ready after ${i}s"
              break
            fi
            sleep 1
          done
          ollama pull llama3.1:8b

      - name: Mirror Kidsnote → Notion (Execution)
        env:
          # 수동 비밀 키 대신 앞선 스텝에서 생성된 플레이라이트 환경 변수를 이어받습니다.
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          OLLAMA_HOST: "http://localhost:11434"
          OLLAMA_MODEL: "llama3.1:8b"
          PYTHONUNBUFFERED: "1"
          KIDSNOTE_CHILD_NAME: ${{ inputs.child_name }}
          DISABLE_ALL_LLM: ${{ inputs.use_ai_features == 'false' && 'true' || 'false' }}
          DISABLE_GROWTH_STORY: ${{ inputs.use_growth_story == 'false' && 'true' || 'false' }}
          DISABLE_MILESTONES: ${{ inputs.use_milestones == 'false' && 'true' || 'false' }}
          DISABLE_INTERESTS: ${{ inputs.use_interests == 'false' && 'true' || 'false' }}
          DISABLE_TEACHER_THANKS: ${{ inputs.use_teacher_thanks == 'false' && 'true' || 'false' }}
        run: |
          set -eu
          ARGS=( "--auth-mode" "session-cookie-env" "--publish-to-notion" "--no-local-save" )
          ARGS+=( "--child-id" "5305112" )

          if [ -n "${{ inputs.limit }}" ]; then
            ARGS+=( "--limit" "${{ inputs.limit }}" )
          fi
          if [ "${{ inputs.monthly_sample }}" = "true" ]; then
            ARGS+=( "--monthly-sample" )
          fi
          if [ "${{ inputs.force_refresh }}" = "true" ]; then
            ARGS+=( "--force-refresh" )
          fi
          python tools/kidsnote_fetch/fetch.py "${ARGS[@]}"

      - name: Verify required secrets were present
        if: failure()
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          for s in NOTION_TOKEN NOTION_DATABASE_ID; do
            if [ -z "${!s:-}" ]; then
              echo "::error::repo secret '$s' is empty or unset"
            fi
          done
